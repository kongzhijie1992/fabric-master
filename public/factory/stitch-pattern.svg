<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#FEF3C7"/>
  
  <!-- Fabric Base Layer -->
  <rect width="400" height="400" fill="url(#fabric-weave)" opacity="0.3"/>
  
  <!-- Main Stitch Pattern - Running Stitch -->
  <g stroke="#D97706" stroke-width="2.5" stroke-linecap="round">
    <!-- Horizontal Stitch Lines -->
    <path d="M20 80 L380 80" stroke-dasharray="15 8"/>
    <path d="M20 140 L380 140" stroke-dasharray="15 8"/>
    <path d="M20 200 L380 200" stroke-dasharray="15 8"/>
    <path d="M20 260 L380 260" stroke-dasharray="15 8"/>
    <path d="M20 320 L380 320" stroke-dasharray="15 8"/>
    
    <!-- Vertical Stitch Lines -->
    <path d="M80 20 L80 380" stroke-dasharray="15 8"/>
    <path d="M140 20 L140 380" stroke-dasharray="15 8"/>
    <path d="M200 20 L200 380" stroke-dasharray="15 8"/>
    <path d="M260 20 L260 380" stroke-dasharray="15 8"/>
    <path d="M320 20 L320 380" stroke-dasharray="15 8"/>
  </g>
  
  <!-- Decorative Stitch Points -->
  <g fill="#F59E0B">
    <!-- Intersection points for horizontal lines -->
    <circle cx="80" cy="80" r="4"/>
    <circle cx="140" cy="80" r="4"/>
    <circle cx="200" cy="80" r="4"/>
    <circle cx="260" cy="80" r="4"/>
    <circle cx="320" cy="80" r="4"/>
    
    <circle cx="80" cy="140" r="4"/>
    <circle cx="140" cy="140" r="4"/>
    <circle cx="200" cy="140" r="4"/>
    <circle cx="260" cy="140" r="4"/>
    <circle cx="320" cy="140" r="4"/>
    
    <circle cx="80" cy="200" r="4"/>
    <circle cx="140" cy="200" r="4"/>
    <circle cx="200" cy="200" r="4"/>
    <circle cx="260" cy="200" r="4"/>
    <circle cx="320" cy="200" r="4"/>
  </g>
  
  <!-- Diagonal Decorative Stitches -->
  <path d="M50 50 L350 350" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="10 5" opacity="0.5"/>
  <path d="M350 50 L50 350" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="10 5" opacity="0.5"/>
  
  <!-- Corner Embellishments -->
  <g transform="translate(20, 20)">
    <circle cx="0" cy="0" r="8" fill="#D97706" opacity="0.4"/>
    <circle cx="0" cy="0" r="5" fill="#F59E0B" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>
  </g>
  
  <g transform="translate(380, 20)">
    <circle cx="0" cy="0" r="8" fill="#D97706" opacity="0.4"/>
    <circle cx="0" cy="0" r="5" fill="#F59E0B" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>
  </g>
  
  <g transform="translate(20, 380)">
    <circle cx="0" cy="0" r="8" fill="#D97706" opacity="0.4"/>
    <circle cx="0" cy="0" r="5" fill="#F59E0B" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>
  </g>
  
  <g transform="translate(380, 380)">
    <circle cx="0" cy="0" r="8" fill="#D97706" opacity="0.4"/>
    <circle cx="0" cy="0" r="5" fill="#F59E0B" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>
  </g>
  
  <!-- Thread Spool Icon in Center -->
  <g transform="translate(200, 200)">
    <rect x="-15" y="-20" width="30" height="40" rx="4" fill="#F59E0B" opacity="0.9"/>
    <rect x="-18" y="-15" width="36" height="6" fill="#D97706"/>
    <rect x="-18" y="9" width="36" height="6" fill="#D97706"/>
    <path d="M-8 -10 L-8 10" stroke="#FEF3C7" stroke-width="2"/>
    <path d="M8 -10 L8 10" stroke="#FEF3C7" stroke-width="2"/>
  </g>
  
  <!-- Gradients and Patterns -->
  <defs>
    <pattern id="fabric-weave" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#FDE68A"/>
      <path d="M0 4 L8 4 M4 0 L4 8" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
</svg>
