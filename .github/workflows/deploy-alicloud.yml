name: Deploy to Alibaba Cloud

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Allow this job to clone the repo and deploy to Alibaba Cloud
permissions:
  contents: read
  id-token: write

env:
  ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAME: garment-site

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Alibaba Cloud Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ACR_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
        
    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=semver,pattern={{version}}
          type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_RFQ_ENDPOINT=${{ secrets.NEXT_PUBLIC_RFQ_ENDPOINT }}
          NEXT_PUBLIC_RFQ_EMAIL=${{ secrets.NEXT_PUBLIC_RFQ_EMAIL }}
          ASSET_BASE_URL=${{ secrets.ASSET_BASE_URL }}
          NEXT_PUBLIC_ASSET_BASE_URL=${{ secrets.NEXT_PUBLIC_ASSET_BASE_URL }}
          BAIDU_TONGJI_ID=${{ secrets.BAIDU_TONGJI_ID }}
          NEXT_PUBLIC_BAIDU_TONGJI_ID=${{ secrets.NEXT_PUBLIC_BAIDU_TONGJI_ID }}
          TENCENT_CAPTCHA_APP_ID=${{ secrets.TENCENT_CAPTCHA_APP_ID }}
          NEXT_PUBLIC_TENCENT_CAPTCHA_APP_ID=${{ secrets.NEXT_PUBLIC_TENCENT_CAPTCHA_APP_ID }}
          
    - name: Deploy to Alibaba Cloud ECS
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ECS_HOST }}
        username: ${{ secrets.ECS_USERNAME }}
        key: ${{ secrets.ECS_SSH_KEY }}
        port: ${{ secrets.ECS_PORT }}
        script: |
          # Pull latest image
          docker login --username='${{ secrets.ACR_USERNAME }}' --password='${{ secrets.ACR_PASSWORD }}' ${{ env.ACR_REGISTRY }}
          docker pull ${{ env.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          
          # Stop and remove old container
          docker stop garment-site || true
          docker rm garment-site || true
          
          # Run new container with environment variables
          docker run -d \
            --name garment-site \
            --restart unless-stopped \
            -p 80:80 \
            -e NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }} \
            -e NEXT_PUBLIC_RFQ_ENDPOINT=${{ secrets.NEXT_PUBLIC_RFQ_ENDPOINT }} \
            -e NEXT_PUBLIC_RFQ_EMAIL=${{ secrets.NEXT_PUBLIC_RFQ_EMAIL }} \
            -e ASSET_BASE_URL=${{ secrets.ASSET_BASE_URL }} \
            -e NEXT_PUBLIC_ASSET_BASE_URL=${{ secrets.NEXT_PUBLIC_ASSET_BASE_URL }} \
            -e BAIDU_TONGJI_ID=${{ secrets.BAIDU_TONGJI_ID }} \
            -e NEXT_PUBLIC_BAIDU_TONGJI_ID=${{ secrets.NEXT_PUBLIC_BAIDU_TONGJI_ID }} \
            -e TENCENT_CAPTCHA_APP_ID=${{ secrets.TENCENT_CAPTCHA_APP_ID }} \
            -e NEXT_PUBLIC_TENCENT_CAPTCHA_APP_ID=${{ secrets.NEXT_PUBLIC_TENCENT_CAPTCHA_APP_ID }} \
            ${{ env.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          
          # Cleanup old images
          docker image prune -af --filter "until=24h"
          
          echo "✅ Deployment completed successfully!"
          
    - name: Health check
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        echo "Waiting 30 seconds for application to start..."
        sleep 30
        curl --fail --retry 3 --retry-delay 10 http://${{ secrets.ECS_HOST }}/api/health || exit 1
        echo "✅ Health check passed!"
