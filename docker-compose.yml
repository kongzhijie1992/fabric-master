version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garment-site-app
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data
    expose:
      - '3000'

  nginx:
    image: fholzer/nginx-brotli:latest
    container_name: garment-site-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      # - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro
