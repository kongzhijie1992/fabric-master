upstream next_app {
  server app:3000;
  keepalive 64;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

  # Requires Nginx brotli module (included in fholzer/nginx-brotli image)
  brotli on;
  brotli_comp_level 5;
  brotli_static on;
  brotli_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

  location /_next/static/ {
    proxy_pass http://next_app;
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location ~* \.(?:svg|png|jpg|jpeg|webp|ico|woff|woff2|ttf|pdf)$ {
    proxy_pass http://next_app;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://next_app;
    proxy_read_timeout 90s;
  }
}
